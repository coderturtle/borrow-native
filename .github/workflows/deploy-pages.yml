name: Deploy build log to GitHub Pages

# Human Gate cleared 2026-07-18: first deploy (workflow_dispatch, run
# 29643477514) confirmed working end to end - site live at
# borrow-native.coderturtle.io serving real content. Push trigger enabled
# below so subsequent build-log updates auto-publish.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/build-log/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      # Custom domain: borrow-native.coderturtle.io, via agentic-infra-lab's
      # github-pages-dns pattern (Route53 CNAME + TXT verification). site/public/CNAME
      # declares the domain; Pages enablement and the custom-domain setting were
      # done as one-time, human-run `gh api` steps (GITHUB_TOKEN cannot do either -
      # see agentic-infra-lab's interpreter-notes.md), not by this workflow.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
