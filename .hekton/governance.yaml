governance_version: 1
project_name: borrow-native
created_date: 2026-07-05
owner: coderturtle
governance_level: G1
autonomy_level: 3

approval_policy:
  destructive_changes: human_required
  public_release: human_required
  production_changes: human_required
  credential_or_secret_changes: human_required
  financial_changes: human_required
  personal_data_changes: human_required
  dependency_changes: human_required

required_gates:
  preflight: true
  intent_recorded: true
  risk_review: true
  reproducibility_review: true
  validation_recorded: true
  end_session_review: true
  commit_hygiene_review: true

minimum_artifacts:
  project_metadata: ".hekton/project.yaml"
  governance: ".hekton/governance.yaml"
  risk_register: ".hekton/risk-register.yaml"
  change_log: ".hekton/change-log.yaml"
  review_log: ".hekton/review-log.yaml"
  agent_run_log: ".hekton/agent-run-log.yaml"
  session_log: "docs/session-log.md"
  decisions: "docs/decisions.md"
  risks: "docs/risks.md"

agent_defaults:
  safe_autonomy: true
  stop_for_human_approval_when_risk_is_high: true
  update_session_log_for_material_changes: true
  prefer_dry_run_before_mutation: true
  never_commit_secrets: true

# Added 2026-07-05, after pivoting to one shared throughline project (fixtures/relay/)
# across all 8 modules: a later module's feature could silently change or break an
# earlier module's already-shipped, already-graded gate. Checked by
# scripts/arb-trigger-check.sh (reads this list), per Coachgremlin's Workflow step 0
# (~/hekton/gremlins/coaching/coachgremlin.md).
arb_review_triggers:
  - pattern: "fixtures/relay/src/lib.rs"
    reason: "relay's core domain types/public API changed - a later module's feature could silently break an earlier module's already-shipped exercise or rubric"
    review_type: governance
  - pattern: "fixtures/relay/SPEC.md"
    reason: "relay's single source of truth changed - every module README that cites it may now be stale"
    review_type: governance
